# Rate limiting configuration
limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;

server {
    listen 80;
    server_name joyshypnose-therapies.com www.joyshypnose-therapies.com;

    root /var/www/joyshypnose;

    # Logging
    access_log /var/log/nginx/joyshypnose.access.log;
    error_log /var/log/nginx/joyshypnose.error.log;

    # Next.js static files
    location /_next/static/ {
        alias /var/www/joyshypnose/.next/standalone/.next/static/;
        expires 365d;
        access_log off;
        try_files $uri $uri/ =404;
    }

    # Images and other static assets
    location ~ ^/_next/image(/.*) {
        proxy_pass http://localhost:3000/_next/image$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public files
    location /public/ {
        alias /var/www/joyshypnose/public/;
        expires 365d;
        access_log off;
        try_files $uri $uri/ =404;
    }

    # Favicon
    location = /favicon.ico {
        alias /var/www/joyshypnose/public/favicon.ico;
        access_log off;
        expires 365d;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add timeout settings
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
        send_timeout 60;

        # Apply rate limiting
        limit_req zone=one burst=10 nodelay;
    }

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
} 